name: Deploy Sanity Studio

on:
  push:
    branches: [main]
    paths:
      - 'sanity/**'
      - 'sanity.config.ts'
      - 'sanity.cli.ts'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Install Sanity CLI
        run: npm install -g sanity@3.80.1

      - name: Deploy Sanity Studio
        run: sanity deploy --yes --url zhrziy57
        env:
          SANITY_AUTH_TOKEN: ${{ secrets.SANITY_AUTH_TOKEN }}
